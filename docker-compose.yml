services:
  edge-server:
    build:
      context: .
      dockerfile: edge-server/Dockerfile
    container_name: edge-server
    environment:
      FILE_STORAGE_DIR: /app/files
      SCHEDULER_MODE: ${SCHEDULER_MODE:-PSO_ACO_GA}
    volumes:
      - ./files:/app/files
    ports:
      - "8080:8080"
      - "8081:8081"
    networks:
      - cluster

  worker-a:
    build:
      context: .
      dockerfile: milkv-node/Dockerfile
    environment:
      NODE_ID: milkv-A
      MEMORY_LIMIT: 128MB
      SIMULATE: "1"
      NODE_SPEED: "0.5"
      EDGE_SERVER: edge-server:8000
      EDGE_API_BASE: http://edge-server:8081
    depends_on:
      - edge-server
    command: [ "sh", "-c", "sleep 2; /app/milkv-node" ]
    restart: unless-stopped
    networks:
      - cluster

  worker-b:
    build:
